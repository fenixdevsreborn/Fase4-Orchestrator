name: fase4

services:
  postgres:
    image: postgres:16-alpine
    container_name: fiap-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../Fase3-UsersAPI/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ms-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: fiap-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USERNAME:?RABBITMQ_USERNAME is required}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}"
      RABBITMQ_DEFAULT_VHOST: fiap
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ms-network

  dynamodb-local:
    image: amazon/dynamodb-local:2.5.4
    container_name: fiap-dynamodb
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    ports:
      - "8000:8000"
    networks:
      - ms-network

  redis:
    image: redis:7-alpine
    container_name: fiap-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ms-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: fiap-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - node.store.allow_mmap=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow\\&timeout=5s || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - ms-network

  dynamodb-init:
    image: amazon/aws-cli:2.15.57
    container_name: fiap-dynamodb-init
    environment:
      AWS_ACCESS_KEY_ID: "${LOCAL_AWS_ACCESS_KEY_ID:?LOCAL_AWS_ACCESS_KEY_ID is required}"
      AWS_SECRET_ACCESS_KEY: "${LOCAL_AWS_SECRET_ACCESS_KEY:?LOCAL_AWS_SECRET_ACCESS_KEY is required}"
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000 >/dev/null 2>&1; do sleep 2; done;
        aws dynamodb create-table
        --endpoint-url http://dynamodb-local:8000
        --table-name Games
        --attribute-definitions AttributeName=Id,AttributeType=S
        --key-schema AttributeName=Id,KeyType=HASH
        --billing-mode PAY_PER_REQUEST
        || true
    depends_on:
      dynamodb-local:
        condition: service_started
    networks:
      - ms-network

  users-api:
    build:
      context: ../Fase3-UsersAPI
      dockerfile: Dockerfile
    container_name: fiap-users-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "${USERS_DB_CONNECTION_STRING:?USERS_DB_CONNECTION_STRING is required}"
      Jwt__Secret: "${JWT_SECRET:?JWT_SECRET is required}"
      Jwt__Issuer: "ms-users-api"
      Jwt__Audience: "ms-users-api-client"
      Jwt__KeyId: "ms-users-api-signing-key"
      Jwt__ExpirationHours: "24"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: "${RABBITMQ_USERNAME:?RABBITMQ_USERNAME is required}"
      RabbitMq__Password: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}"
      RabbitMq__VirtualHost: fiap
      RabbitMq__ExchangeName: fiap.events
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ms-network

  notifications-worker:
    image: adinteltidev/fase4-notifications-api:latest
    build:
      context: ../Fase4-NotificationAPI
      dockerfile: src/Dockerfile
    container_name: fiap-notifications-worker
    environment:
      DOTNET_ENVIRONMENT: Development
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: "${RABBITMQ_USERNAME:?RABBITMQ_USERNAME is required}"
      RabbitMq__Password: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}"
      RabbitMq__VirtualHost: fiap
      RabbitMq__ExchangeName: fiap.events
      RabbitMq__NotificationQueueName: notification-queue
      MT_LICENSE: Community
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ms-network

  games-api:
    build:
      context: ../Fase3-GamesAPI
      dockerfile: Dockerfile
    container_name: fiap-games-api
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      AWS__Region: us-east-1
      AWS__ServiceURL: http://dynamodb-local:8000
      AWS_ACCESS_KEY_ID: "${LOCAL_AWS_ACCESS_KEY_ID:?LOCAL_AWS_ACCESS_KEY_ID is required}"
      AWS_SECRET_ACCESS_KEY: "${LOCAL_AWS_SECRET_ACCESS_KEY:?LOCAL_AWS_SECRET_ACCESS_KEY is required}"
      DynamoDb__GamesTable: Games
      Jwt__Secret: "${JWT_SECRET:?JWT_SECRET is required}"
      Jwt__Issuer: "ms-users-api"
      Jwt__Audience: "ms-users-api-client"
      Jwt__KeyId: "ms-users-api-signing-key"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: "${RABBITMQ_USERNAME:?RABBITMQ_USERNAME is required}"
      RabbitMq__Password: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}"
      RabbitMq__VirtualHost: fiap
      RabbitMq__ExchangeName: fiap.events
      RabbitMq__PaymentQueueName: payment-queue
      Elasticsearch__Url: http://elasticsearch:9200
      Elasticsearch__IndexName: games
      Redis__Host: redis
      Redis__Port: "6379"
      Redis__InstanceName: "games-api:"
      Cache__GamesListKey: games:list
      Cache__GamesListTtlSeconds: "300"
    depends_on:
      rabbitmq:
        condition: service_healthy
      dynamodb-init:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ms-network

  notifications-worker:
    build:
      context: ../Fase2-NotificationsAPI
      dockerfile: src/Dockerfile
    container_name: ms-notifications-worker
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_ENVIRONMENT: Development
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: "${RABBITMQ_USERNAME:?RABBITMQ_USERNAME is required}"
      RabbitMq__Password: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}"
      RabbitMq__VirtualHost: fiap
      RabbitMq__ExchangeName: fiap.events
      RabbitMq__NotificationQueueName: notification-queue
      RabbitMq__UserCreatedQueueName: notification-queue
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ms-network

volumes:
  postgres_data:
    name: fiap-postgres-data
  rabbitmq_data:
    name: fiap-rabbitmq-data

networks:
  ms-network:
    name: fiap-ms-network
    driver: bridge
